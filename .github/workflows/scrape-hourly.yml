name: Hourly Job Scraper

on:
  schedule:
    # Every hour at :05 past (UTC)
    - cron: '5 * * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Trigger scraper via API
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.BACKEND_SERVICE_TOKEN }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.BACKEND_URL }}/api/admin/run-scrapers")
          echo "Response status: $RESPONSE"
          if [ "$RESPONSE" -lt 200 ] || [ "$RESPONSE" -ge 300 ]; then
            echo "❌ Scraper trigger failed with status $RESPONSE"
            exit 1
          fi
          echo "✅ Scraper triggered successfully"

      - name: Notify on failure
        if: failure()
        run: |
          echo "Scraper GitHub Action failed at $(date)"
          # Optionally add Telegram/Slack notification here
