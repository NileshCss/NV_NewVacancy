name: Daily Expire Jobs

on:
  schedule:
    # 2:00 AM IST = 20:30 UTC previous day
    - cron: '30 20 * * *'
  workflow_dispatch:

jobs:
  expire:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Validate required secrets
        run: |
          MISSING=""
          if [ -z "${{ secrets.BACKEND_URL }}" ]; then
            MISSING="$MISSING BACKEND_URL"
          fi
          if [ -z "${{ secrets.BACKEND_SERVICE_TOKEN }}" ]; then
            MISSING="$MISSING BACKEND_SERVICE_TOKEN"
          fi
          if [ -n "$MISSING" ]; then
            echo "❌ FATAL: The following secrets are not set in GitHub repo → Settings → Secrets and variables → Actions:"
            echo "   Missing:$MISSING"
            echo "Set them and re-run."
            exit 1
          fi
          echo "✅ All required secrets are present"

      - name: Trigger expire check via API
        run: |
          echo "Triggering expire check at $(date)"
          RESPONSE_BODY=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.BACKEND_SERVICE_TOKEN }}" \
            -H "Content-Type: application/json" \
            --max-time 60 \
            "${{ secrets.BACKEND_URL }}/api/admin/run-expire")
          HTTP_CODE=$(echo "$RESPONSE_BODY" | tail -n1)
          BODY=$(echo "$RESPONSE_BODY" | head -n -1)
          echo "Response status: $HTTP_CODE"
          echo "Response body: $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "❌ Expire trigger failed with status $HTTP_CODE"
            exit 1
          fi
          echo "✅ Daily expire check complete"
